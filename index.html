<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Producción - GS1-128 Arcor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        body { background-color: #EAF0F6; }
        .scanner-container video { border-radius: 0.5rem; object-fit: cover; }
        /* Guía visual para alinear el código de barras a 10-15 cm */
        .scan-overlay { pointer-events: none; }
        .scan-target { border: 3px dashed rgba(255,255,255,0.9); width: 92%; height: 26%; box-shadow: 0 0 0 9999px rgba(0,0,0,0.35) inset; border-radius: 0.6rem; display:flex; align-items:center; justify-content:center; }
        .scan-note { color: #fff; font-weight:700; font-size:0.9rem; text-shadow: 0 1px 2px rgba(0,0,0,0.6); }
        .focus-dot { position: absolute; width: 44px; height: 12px; border-radius: 6px; background: rgba(255,255,255,0.95); transform: translate(-50%, -50%) scale(0.8); display:flex; align-items:center; justify-content:center; color:#111; font-weight:700; font-size:0.75rem; box-shadow:0 4px 10px rgba(0,0,0,0.4); pointer-events:none; opacity:0; transition:opacity .25s ease, transform .3s cubic-bezier(.2,.9,.2,1); }
    </style>
</head>
<body class="font-sans text-gray-800 antialiased min-h-screen pb-12">

    <header class="bg-blue-900 text-white shadow-md p-4 sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-tight">Control de Pallets</h1>
                <p class="text-xs text-blue-200">Extractor GS1-128 / Planta San Juan</p>
            </div>
            <div class="bg-blue-800 px-3 py-1.5 rounded-lg text-right">
                <span class="text-xs block text-blue-300 font-semibold uppercase">Total Filas</span>
                <span id="global-counter" class="text-lg font-bold">0</span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">

        <section class="bg-white rounded-xl shadow-sm p-4 border border-gray-200">
            <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">Configuración de Flujo</h2>
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Nro. Pallet Actual</label>
                    <input type="number" id="pallet-number" value="1" min="1" 
                           class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-base font-bold text-blue-900 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Tipo de Envase</label>
                    <select id="packaging-mode" onchange="handleModeChange()" 
                            class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-base font-semibold focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <option value="tambor">Tambores (4 por Pallet)</option>
                        <option value="totem">Tótem (1 por Pallet)</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-200">
            <div class="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                <span class="font-bold text-sm text-gray-700">Escáner de Barra Industrial</span>
                <span id="scanner-status" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-200 text-gray-800">
                    Apagado
                </span>
            </div>
            <div class="p-4 bg-black flex justify-center items-center relative aspect-video" id="scanner-wrapper">
                <div id="reader" class="w-full scanner-container"></div>
                <div id="scan-overlay" class="scan-overlay absolute inset-0 flex items-center justify-center">
                    <div class="scan-target">
                        <div class="scan-note">Mantener 10–15 cm · Alinear horizontalmente</div>
                    </div>
                    <div id="focus-dot" class="focus-dot">OK</div>
                </div>
            </div>
            <div class="p-3 bg-gray-50 border-t border-gray-200 flex gap-2">
                <button onclick="startScanner()" id="btn-start" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg text-sm transition-colors shadow-sm">
                    Encender Cámara
                </button>
                <button onclick="stopScanner()" id="btn-stop" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-2.5 px-4 rounded-lg text-sm transition-colors shadow-sm hidden">
                    Detener
                </button>
            </div>
        </section>

        <section class="bg-white rounded-xl shadow-sm p-4 border border-gray-200">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-sm font-bold text-gray-700">Datos del Ítem Actual</h3>
                <span id="item-slot-indicator" class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">Tambor 1 de 4</span>
            </div>
            <div class="grid grid-cols-2 gap-2.5 text-xs">
                <div>
                    <label class="block text-gray-500 mb-0.5">Lote (DDMMYY)</label>
                    <input type="text" id="field-lote" class="w-full border rounded p-1.5 font-mono text-sm bg-gray-50">
                </div>
                <div>
                    <label class="block text-gray-500 mb-0.5">Cabezal</label>
                    <input type="text" id="field-cabezal" class="w-full border rounded p-1.5 font-mono text-sm bg-gray-50">
                </div>
                <div>
                    <label class="block text-gray-500 mb-0.5">Fecha Fab.</label>
                    <input type="text" id="field-fecha" class="w-full border rounded p-1.5 text-sm bg-gray-50">
                </div>
                <div>
                    <label class="block text-gray-500 mb-0.5">Hora</label>
                    <input type="text" id="field-hora" class="w-full border rounded p-1.5 text-sm bg-gray-50">
                </div>
                <div class="col-span-2 grid grid-cols-3 gap-2 mt-1">
                    <div class="col-span-1">
                        <label class="block text-gray-500 mb-0.5 font-bold text-blue-900">Peso Neto</label>
                        <input type="number" step="0.1" id="field-peso" class="w-full border border-blue-300 font-bold rounded p-1.5 text-sm bg-blue-50">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-gray-500 mb-0.5">Observaciones</label>
                        <input type="text" id="field-obs" placeholder="Opcional..." class="w-full border rounded p-1.5 text-sm bg-gray-50">
                    </div>
                </div>
            </div>
            <button onclick="commitCurrentItem()" class="w-full mt-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg text-sm shadow transition-colors">
                Confirmar e Ingresar Registro
            </button>
        </section>

        <section class="bg-white rounded-xl shadow-sm p-4 border border-gray-200">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-sm font-bold text-gray-700">Registros en Memoria</h3>
                <button onclick="clearAllData()" class="text-xs font-semibold text-red-600 hover:underline">Limpiar Todo</button>
            </div>
            
            <div class="overflow-x-auto border rounded-lg max-h-60 mb-4 bg-gray-50">
                <table class="w-full text-left text-xs border-collapse">
                    <thead class="bg-gray-100 sticky top-0 border-b border-gray-200 text-gray-600 font-bold">
                        <tr>
                            <th class="p-2">Pallet</th>
                            <th class="p-2">Cabezal</th>
                            <th class="p-2">Peso</th>
                            <th class="p-2 text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-200">
                        <tr>
                            <td colspan="4" class="p-4 text-center text-gray-400 italic">No hay registros cargados aún.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <button onclick="exportToExcel()" class="w-full bg-blue-900 hover:bg-blue-950 text-white font-bold py-3 rounded-xl flex justify-center items-center gap-2 shadow transition-all">
                Descargar Reporte Excel (.xlsx)
            </button>
        </section>
    </main>

    <script>
        let masterData = [];
        let html5QrCode = null;
        let currentItemCount = 0;

        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('arcor_production_data')) {
                masterData = JSON.parse(localStorage.getItem('arcor_production_data'));
                updateUI();
            }
            handleModeChange();
            attachTapToFocus();
        });

        function handleModeChange() {
            const mode = document.getElementById('packaging-mode').value;
            const indicator = document.getElementById('item-slot-indicator');
            if (mode === 'totem') {
                currentItemCount = 0;
                indicator.innerText = "Modo: Tótem Único";
                indicator.className = "text-xs font-bold text-amber-600 bg-amber-50 px-2 py-0.5 rounded";
            } else {
                indicator.innerText = `Tambor ${currentItemCount + 1} de 4`;
                indicator.className = "text-xs font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded";
            }
        }

        // LIMPIEZA Y PARSEO ROBUSTO PARA GS1-128
        function parseArcorBarcode(rawCode) {
            // Elimina prefijos comunes de simbología que inyectan algunos decodificadores (ej: ]C1, ~1, o espacios nativos)
            let cleanCode = rawCode.replace(/^\]C1/, '').replace(/^~1/, '').replace(/\s+/g, '').trim();
            
            // Busca la cadena numérica continua de Arcor (debe tener al menos 23 dígitos)
            // Esto descarta basura al inicio o final del string capturado por la cámara
            const match = cleanCode.match(/\d{23,}/);
            if (!match) return null;
            
            const code = match[0];

            try {
                // 1. Fecha de fabricación (YYMMDD -> Posiciones 0 a 5)
                const yy = code.substring(0, 2);
                const mm = code.substring(2, 4);
                const dd = code.substring(4, 6);
                const fechaFab = `${parseInt(dd)}/${parseInt(mm)}/20${yy}`;
                const lote = `${dd}${mm}${yy}`;

                // 2. Hora de fabricación (HHMM -> Posiciones 6 a 9)
                const hora = `${code.substring(6, 8)}:${code.substring(8, 10)}`;

                // 3. Peso Neto (Posiciones 14 a 17) -> Ejemplo: "2404" -> 240.4
                const rawWeight = parseFloat(code.substring(14, 18));
                const pesoNeto = (rawWeight / 10).toFixed(1);

                // 4. Cabezal / Nro de Bolsa (Posición 18 en adelante)
                // Regla: 1 = A, 2 = B
                const headPrefixDigit = code.substring(18, 19);
                const letter = headPrefixDigit === '1' ? 'A' : (headPrefixDigit === '2' ? 'B' : 'X');
                const headNumber = code.substring(19);
                const cabezal = `${letter}${headNumber}`;

                return { lote, cabezal, fechaFab, hora, pesoNeto };
            } catch (error) {
                console.error("Fallo en el despiece de los bloques numéricos:", error);
                return null;
            }
        }

        function startScanner() {
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('btn-stop').classList.remove('hidden');
            
            const statusLabel = document.getElementById('scanner-status');
            statusLabel.innerText = "Escaneando...";
            statusLabel.className = "inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 animate-pulse";

            html5QrCode = new Html5Qrcode("reader");
            
            // Ajuste del cuadro de enfoque: Al ser un código de barra de formato ancho (1D),
            // un cuadro alto confunde a la cámara. Hacemos la caja de escaneo muy ancha y delgada.
            const config = { 
                fps: 30, // Más cuadros por segundo para evitar barrido borroso a corta distancia
                // Caja ancha y baja para códigos 1D (rectángulo horizontal) optimizada para 10-15 cm
                qrbox: (width, height) => {
                    return { width: Math.floor(width * 0.98), height: Math.floor(height * 0.24) };
                },
                aspectRatio: 1.777778,
                formatsToSupport: [ Html5QrcodeSupportedFormats.CODE_128 ],
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            };

            const cameraConfig = { videoConstraints: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } } };

            html5QrCode.start(
                cameraConfig,
                config,
                (decodedText) => {
                    const parsed = parseArcorBarcode(decodedText);
                    
                    if (parsed) {
                        vibrateDevice();
                        document.getElementById('field-lote').value = parsed.lote;
                        document.getElementById('field-cabezal').value = parsed.cabezal;
                        document.getElementById('field-fecha').value = parsed.fechaFab;
                        document.getElementById('field-hora').value = parsed.hora;
                        document.getElementById('field-peso').value = parsed.pesoNeto;
                        document.getElementById('field-obs').value = ""; // Limpia errores previos si lee bien
                    } else {
                        // Resguardo: Si detecta la barra pero no procesa la lógica, te deja ver el string crudo
                        document.getElementById('field-obs').value = "GS1 sin formato Arcor: " + decodedText;
                    }
                },
                (errorMessage) => { /* Silenciar alertas de no-detección instantánea */ }
            ).catch(err => {
                alert("Error de cámara: " + err);
                stopScanner();
            });

            // Intentar ajustar parámetros del track (zoom / focus) cuando esté disponible
            setTimeout(() => {
                try {
                    const videoEl = document.querySelector('#reader video');
                    if (videoEl && videoEl.srcObject) {
                        const track = videoEl.srcObject.getVideoTracks()[0];
                        if (track && track.applyConstraints) {
                            const constraints = {};
                            const adv = [];
                            // Intentar forzar enfoque continuo y algo de zoom si el dispositivo lo soporta
                            adv.push({ focusMode: 'continuous' });
                            adv.push({ zoom: 2 });
                            constraints.advanced = adv;
                            track.applyConstraints(constraints).catch(() => { /* no todos los dispositivos lo permiten */ });
                        }
                    }
                } catch (e) { /* silencioso */ }
            }, 800);
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('btn-start').classList.remove('hidden');
                    document.getElementById('btn-stop').classList.add('hidden');
                    const statusLabel = document.getElementById('scanner-status');
                    statusLabel.innerText = "Apagado";
                    statusLabel.className = "inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-200 text-gray-800";
                }).catch(err => console.error(err));
            }
        }

        function vibrateDevice() {
            if (navigator.vibrate) navigator.vibrate(120);
        }

        // Mostrar un indicador visual de foco en la superposición
        function showFocusDot(px, py, text = 'OK') {
            const dot = document.getElementById('focus-dot');
            if (!dot) return;
            dot.style.left = px + 'px';
            dot.style.top = py + 'px';
            dot.textContent = text;
            dot.style.opacity = '1';
            dot.style.transform = 'translate(-50%, -50%) scale(1)';
            setTimeout(() => {
                dot.style.opacity = '0';
                dot.style.transform = 'translate(-50%, -50%) scale(0.8)';
            }, 650);
        }

        async function tryFocusAtPoint(relX, relY) {
            try {
                const videoEl = document.querySelector('#reader video');
                if (!videoEl || !videoEl.srcObject) return false;
                const track = videoEl.srcObject.getVideoTracks()[0];
                if (!track) return false;

                const capabilities = track.getCapabilities ? track.getCapabilities() : {};

                // Coordenadas relativas en [0..1]
                const point = { x: relX, y: relY };

                const constraints = { advanced: [] };

                // Pista: muchos navegadores no soportan pointsOfInterest, pero intentamos
                if (capabilities.pointsOfInterest) {
                    constraints.advanced.push({ pointsOfInterest: [point] });
                }

                if (capabilities.focusMode && capabilities.focusMode.includes('single-shot')) {
                    constraints.advanced.push({ focusMode: 'single-shot' });
                }

                // Si soporta zoom, aplicar un pequeño ajuste rápido hacia adelante y atrás
                if (capabilities.zoom) {
                    const zmin = capabilities.zoom.min || 1;
                    const zmax = capabilities.zoom.max || zmin;
                    const mid = Math.min(zmax, Math.max(zmin, (zmin + zmax) / 2));
                    constraints.advanced.push({ zoom: mid });
                }

                // Si no hay nada en advanced, intentar forzar focusMode genérico
                if (constraints.advanced.length === 0) {
                    // Fallback: some devices accept focusMode without capabilities
                    constraints.advanced.push({ focusMode: 'single-shot' });
                }

                await track.applyConstraints(constraints).then(() => true).catch(() => false);
                return true;
            } catch (e) {
                return false;
            }
        }

        // Adjuntar evento de toque/ratón sobre la superposición para enfocar
        function attachTapToFocus() {
            const overlay = document.getElementById('scan-overlay');
            if (!overlay) return;
            overlay.addEventListener('click', async (ev) => {
                ev.preventDefault();
                const rect = overlay.getBoundingClientRect();
                const x = (ev.clientX - rect.left) / rect.width;
                const y = (ev.clientY - rect.top) / rect.height;
                const px = ev.clientX - rect.left;
                const py = ev.clientY - rect.top;
                const ok = await tryFocusAtPoint(x, y);
                showFocusDot(px, py, ok ? 'OK' : '—');
                if (ok) vibrateDevice();
            }, { passive: true });
        }

        function commitCurrentItem() {
            const palletNum = document.getElementById('pallet-number').value;
            const mode = document.getElementById('packaging-mode').value;

            const newItem = {
                pallet: palletNum,
                lote: document.getElementById('field-lote').value || "-",
                cabezal: document.getElementById('field-cabezal').value || "-",
                fechaFab: document.getElementById('field-fecha').value || "-",
                hora: document.getElementById('field-hora').value || "-",
                pesoNeto: document.getElementById('field-peso').value || "0",
                observaciones: document.getElementById('field-obs').value || ""
            };

            masterData.push(newItem);
            localStorage.setItem('arcor_production_data', JSON.stringify(masterData));

            if (mode === 'tambor') {
                currentItemCount++;
                if (currentItemCount >= 4) {
                    document.getElementById('pallet-number').value = parseInt(palletNum) + 1;
                    currentItemCount = 0;
                }
            } else {
                document.getElementById('pallet-number').value = parseInt(palletNum) + 1;
            }

            // Limpieza express
            document.getElementById('field-lote').value = "";
            document.getElementById('field-cabezal').value = "";
            document.getElementById('field-fecha').value = "";
            document.getElementById('field-hora').value = "";
            document.getElementById('field-peso').value = "";
            document.getElementById('field-obs').value = "";

            handleModeChange();
            updateUI();
        }

        function removeRow(index) {
            masterData.splice(index, 1);
            localStorage.setItem('arcor_production_data', JSON.stringify(masterData));
            updateUI();
        }

        function clearAllData() {
            if (confirm("¿Borrar todo el historial local del teléfono?")) {
                masterData = [];
                localStorage.removeItem('arcor_production_data');
                document.getElementById('pallet-number').value = 1;
                currentItemCount = 0;
                handleModeChange();
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('global-counter').innerText = masterData.length;
            const tbody = document.getElementById('table-body');
            
            if (masterData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-gray-400 italic">No hay registros cargados aún.</td></tr>`;
                return;
            }

            let html = "";
            for (let i = masterData.length - 1; i >= 0; i--) {
                const item = masterData[i];
                html += `
                    <tr class="hover:bg-gray-100 border-b">
                        <td class="p-2 font-bold text-blue-900">${item.pallet}</td>
                        <td class="p-2 font-mono">${item.cabezal}</td>
                        <td class="p-2 font-semibold">${item.pesoNeto} kg</td>
                        <td class="p-2 text-center">
                            <button onclick="removeRow(${i})" class="text-red-500 font-bold px-2">✕</button>
                        </td>
                    </tr>
                `;
            }
            tbody.innerHTML = html;
        }

        function exportToExcel() {
            if (masterData.length === 0) {
                alert("No hay datos cargados.");
                return;
            }

            const rowsForExcel = masterData.map(item => ({
                "PALLET": parseInt(item.pallet),
                "LOTE": item.lote,
                "CABEZAL": item.cabezal,
                "FECHA FAB": item.fechaFab,
                "HORA": item.hora,
                "PESO NETO": parseFloat(item.pesoNeto),
                "OBSERVACIONES": item.observaciones
            }));

            const worksheet = XLSX.utils.json_to_sheet(rowsForExcel);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Producción");

            worksheet["!cols"] = [
                { wch: 10 }, { wch: 12 }, { wch: 14 }, { wch: 14 }, { wch: 10 }, { wch: 14 }, { wch: 24 }
            ];

            const dateStr = new Date().toISOString().slice(0, 10);
            XLSX.writeFile(workbook, `Planilla_Produccion_${dateStr}.xlsx`);
        }
    </script>
</body>
</html>
